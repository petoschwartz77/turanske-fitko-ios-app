workflows:
  ios-test-build:
    name: iOS test build - Turanské Fitko
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Generate branded app icons
        script: |
          python3 "$CM_BUILD_DIR/scripts/generate_app_icons.py"
      - name: Prepare production release
        script: |
          python3 "$CM_BUILD_DIR/scripts/prepare_release.py" \
            --web-version "6.58" \
            --marketing-version "1.0"
          grep -Fq "https://turanskefitko.sk/?tfm_mobile_app=1&native=ios&tfma_v=6.58" \
            "$CM_BUILD_DIR/TuranskeFitkoApp/ContentView.swift"
          ! grep -Fq "dev.turanskefitko.sk" \
            "$CM_BUILD_DIR/TuranskeFitkoApp/ContentView.swift"
          test "$(/usr/libexec/PlistBuddy -c 'Print :ITSAppUsesNonExemptEncryption' "$CM_BUILD_DIR/TuranskeFitkoApp/Info.plist")" = "false"
      - name: Show project files
        script: |
          ls -la
          find . -maxdepth 2 -type f | sort
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "TuranskeFitkoApp.xcodeproj" \
            -scheme "TuranskeFitkoApp"
      - name: Build unsigned simulator app
        script: |
          xcodebuild build \
            -project "TuranskeFitkoApp.xcodeproj" \
            -scheme "TuranskeFitkoApp" \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.dSYM

  ios-testflight:
    name: iOS TestFlight - Turanské Fitko
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Codemagic Turanské Fitko"
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: sk.turanskefitko.app
    scripts:
      - name: Generate branded app icons
        script: |
          python3 "$CM_BUILD_DIR/scripts/generate_app_icons.py"
      - name: Prepare production release
        script: |
          python3 "$CM_BUILD_DIR/scripts/prepare_release.py" \
            --web-version "6.58" \
            --marketing-version "1.0"
          grep -Fq "https://turanskefitko.sk/?tfm_mobile_app=1&native=ios&tfma_v=6.58" \
            "$CM_BUILD_DIR/TuranskeFitkoApp/ContentView.swift"
          ! grep -Fq "dev.turanskefitko.sk" \
            "$CM_BUILD_DIR/TuranskeFitkoApp/ContentView.swift"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "$CM_BUILD_DIR/TuranskeFitkoApp/Info.plist")" = "Turanské Fitko App"
          test "$(/usr/libexec/PlistBuddy -c 'Print :ITSAppUsesNonExemptEncryption' "$CM_BUILD_DIR/TuranskeFitkoApp/Info.plist")" = "false"
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "TuranskeFitkoApp.xcodeproj" \
            -scheme "TuranskeFitkoApp"
      - name: Set unique build number
        script: |
          BUILD_NUMBER=$(date -u +%Y%m%d%H%M)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" \
            "$CM_BUILD_DIR/TuranskeFitkoApp/Info.plist"
          echo "Using build number: $BUILD_NUMBER"
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/TuranskeFitkoApp.xcodeproj" \
            --scheme "TuranskeFitkoApp"
      - name: Validate signed IPA metadata
        script: |
          IPA_PATH=$(find "$CM_BUILD_DIR/build/ios/ipa" -name "*.ipa" -print -quit)
          test -n "$IPA_PATH"

          VALIDATION_DIR=$(mktemp -d)
          unzip -q "$IPA_PATH" -d "$VALIDATION_DIR"
          APP_PATH=$(find "$VALIDATION_DIR/Payload" -maxdepth 1 -name "*.app" -print -quit)
          test -n "$APP_PATH"

          PLIST_PATH="$APP_PATH/Info.plist"
          EXECUTABLE_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$PLIST_PATH")
          ICON_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$PLIST_PATH")
          DISPLAY_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$PLIST_PATH")
          APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST_PATH")
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST_PATH")
          NON_EXEMPT_ENCRYPTION=$(/usr/libexec/PlistBuddy -c "Print :ITSAppUsesNonExemptEncryption" "$PLIST_PATH")

          test -x "$APP_PATH/$EXECUTABLE_NAME"
          test "$ICON_NAME" = "AppIcon"
          test "$DISPLAY_NAME" = "Turanské Fitko App"
          test "$APP_VERSION" = "1.0"
          test "$BUNDLE_ID" = "sk.turanskefitko.app"
          test "$NON_EXEMPT_ENCRYPTION" = "false"
          test -f "$APP_PATH/Assets.car"

          echo "Validated executable: $EXECUTABLE_NAME"
          echo "Validated display name: $DISPLAY_NAME"
          echo "Validated app version: $APP_VERSION"
          echo "Validated bundle identifier: $BUNDLE_ID"
          echo "Validated non-exempt encryption: $NON_EXEMPT_ENCRYPTION"
          echo "Validated icon asset: $ICON_NAME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
